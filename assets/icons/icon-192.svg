<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- German flag stripes (subtle, at top) -->
  <rect x="24" y="20" width="144" height="8" rx="4" fill="#000" opacity="0.6"/>
  <rect x="24" y="32" width="144" height="8" rx="4" fill="#DD0000" opacity="0.6"/>
  <rect x="24" y="44" width="144" height="8" rx="4" fill="#FFCC00" opacity="0.6"/>
  <!-- Brandenburg Gate simplified -->
  <g transform="translate(96,100)" fill="white" opacity="0.15">
    <rect x="-40" y="-20" width="80" height="40" rx="2"/>
    <rect x="-44" y="-28" width="88" height="10" rx="2"/>
    <rect x="-36" y="-20" width="6" height="40"/>
    <rect x="-20" y="-20" width="6" height="40"/>
    <rect x="-4" y="-20" width="6" height="40"/>
    <rect x="14" y="-20" width="6" height="40"/>
    <rect x="30" y="-20" width="6" height="40"/>
    <!-- Quadriga on top -->
    <path d="M-15,-28 L-10,-38 L-5,-32 L0,-40 L5,-32 L10,-38 L15,-28" fill="white"/>
  </g>
  <!-- Main text -->
  <text x="96" y="98" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="bold" fill="white" letter-spacing="-1">DE</text>
  <text x="96" y="134" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="rgba(255,255,255,0.95)">Tedesco</text>
  <text x="96" y="158" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="rgba(255,255,255,0.75)">Facile</text>
  <!-- Small book icon -->
  <g transform="translate(96,170)" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5">
    <path d="M-8,0 L-8,-8 Q0,-10 0,-6 L0,0 Q0,-4 -8,0"/>
    <path d="M8,0 L8,-8 Q0,-10 0,-6 L0,0 Q0,-4 8,0"/>
  </g>
</svg>
