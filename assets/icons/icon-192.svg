<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect x="4" y="4" width="184" height="184" rx="38" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <!-- Open book shape -->
  <g transform="translate(96,88)">
    <!-- Left page -->
    <path d="M-8,28 L-8,-28 Q-8,-36 -16,-36 L-48,-36 Q-56,-36 -56,-28 L-56,28 Q-56,32 -52,32 L-12,32 Q-8,32 -8,28Z" fill="rgba(255,255,255,0.15)"/>
    <!-- Right page -->
    <path d="M8,28 L8,-28 Q8,-36 16,-36 L48,-36 Q56,-36 56,-28 L56,28 Q56,32 52,32 L12,32 Q8,32 8,28Z" fill="rgba(255,255,255,0.2)"/>
    <!-- Spine -->
    <path d="M-8,-36 Q0,-30 8,-36" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <line x1="0" y1="-33" x2="0" y2="32" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <!-- Text lines on left page -->
    <line x1="-46" y1="-20" x2="-18" y2="-20" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-46" y1="-10" x2="-24" y2="-10" stroke="rgba(255,255,255,0.2)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-46" y1="0" x2="-20" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Text lines on right page -->
    <line x1="18" y1="-20" x2="46" y2="-20" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="18" y1="-10" x2="40" y2="-10" stroke="rgba(255,255,255,0.2)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="18" y1="0" x2="44" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Speech bubble with DE -->
  <g transform="translate(132,42)" filter="url(#glow)">
    <rect x="-28" y="-20" width="56" height="36" rx="10" fill="url(#accent)"/>
    <polygon points="-8,16 0,24 4,16" fill="url(#accent)"/>
    <text x="0" y="4" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#4F46E5" letter-spacing="-0.5">DE</text>
  </g>
  <!-- German flag dots (subtle) -->
  <circle cx="40" cy="42" r="6" fill="#1A1A1A" opacity="0.5"/>
  <circle cx="40" cy="56" r="6" fill="#DD0000" opacity="0.5"/>
  <circle cx="40" cy="70" r="6" fill="#FFCC00" opacity="0.5"/>
  <!-- Italian flag dots -->
  <circle cx="56" cy="42" r="6" fill="#009246" opacity="0.5"/>
  <circle cx="56" cy="56" r="6" fill="white" opacity="0.5"/>
  <circle cx="56" cy="70" r="6" fill="#CE2B37" opacity="0.5"/>
  <!-- Arrow between flags -->
  <path d="M46,56 L50,56" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- App name -->
  <text x="96" y="156" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="white" letter-spacing="0.5" opacity="0.95">Tedesco Facile</text>
  <text x="96" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" letter-spacing="1">IMPARA IL TEDESCO</text>
</svg>
