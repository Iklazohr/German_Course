name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Bump version
        run: |
          CURRENT=$(grep -oP "'\K[0-9]+\.[0-9]+\.[0-9]+" js/version.js)
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "Bumping version: $CURRENT -> $NEW_VERSION"
          sed -i "s/APP_VERSION = '.*'/APP_VERSION = '$NEW_VERSION'/" js/version.js
          sed -i "s/tedesco-facile-v[0-9.]*/tedesco-facile-v$NEW_VERSION/" sw.js
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/version.js sw.js
          git commit -m "chore: bump version to v$NEW_VERSION"
          git push

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: german-course-1cc9b
